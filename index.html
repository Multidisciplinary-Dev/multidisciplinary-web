<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multidisciplinary Dev Tools</title>
    <style>
        body { background-color: #1a1a2e; color: white; text-align: center; font-family: sans-serif; margin: 0; }
        nav { background: #0f3460; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e94560; }
        nav ul { list-style: none; display: flex; gap: 20px; padding: 0; margin: 0; }
        nav ul li a { color: white; text-decoration: none; font-weight: bold; }
        nav .logo { font-size: 20px; font-weight: bold; color: #e94560; }
        .container { margin-top: 50px; padding: 20px; border: 2px solid #e94560; display: inline-block; border-radius: 15px; background: #16213e; }
        button { background-color: #e94560; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        #password-display, #ip-display { font-size: 24px; margin: 20px; color: #0f3460; background: white; padding: 10px; border-radius: 5px; min-width: 250px; word-wrap: break-word; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Multidisciplinary Dev</div>
        <ul>
            <li><a href="#">Password Gen</a></li>
            <li><a href="#">IP Tool</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Multidisciplinary Developer Tools</h1>
        <p>Strong Password Generator</p>
        <div id="password-display">********</div>
        <button onclick="generatePass()">Generate Password</button>
    </div>
    <br>
    <div class="container">
        <h1>IP Info Tool</h1>
        <p>Your Virtual IP Address is:</p>
        <div id="ip-display">192.168.1.1</div>
        <button onclick="showIP()">Check IP</button>
    </div>
    <script>
        function generatePass() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
            let password = "";
            for (let i = 0; i < 12; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("password-display").innerText = password;
        }
        function showIP() {
            document.getElementById("ip-display").innerText = "192.168.1.254";
            alert("Checking Connection... Ping successful!");
        }
    </script>
</body>
</html>
