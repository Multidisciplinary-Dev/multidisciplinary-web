<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>MD STUDIO | REGA ULTIMATE</title>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: 'Consolas', sans-serif; overflow: hidden; }
        
        /* 🔐 Login */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0a0a15; padding: 40px; border: 2px solid var(--cyan); border-radius: 20px; text-align: center; width: 350px; }
        .inp { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 8px; box-sizing: border-box; }
        
        /* 📱 Layout */
        #app { display: none; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: #080810; border-right: 2px solid #1a1a25; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; background: #111; border: 1px solid #222; border-radius: 10px; cursor: pointer; color: #888; font-weight: bold; text-align: left; }
        .btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* 🎨 Code to Art */
        #code-editor { width: 100%; height: 150px; background: #111; color: var(--green); border: 1px solid #333; padding: 10px; font-family: monospace; }
        #artCanvas { background: white; border-radius: 10px; margin-top: 10px; }

        /* 🤖 Bot & Debugger */
        .debug-area { background: #0f0f1a; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        #debug-output { margin-top: 10px; padding: 10px; border-radius: 5px; font-weight: bold; }

        #bot-window { position: fixed; bottom: 20px; left: 20px; width: 300px; height: 400px; background: #0a0a0f; border: 2px solid var(--cyan); border-radius: 15px; display: none; flex-direction: column; overflow: hidden; }
        #msgs { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--cyan)">MD ACCESS</h2>
        <input type="text" id="u-name" class="inp" placeholder="Admin Name">
        <input type="password" id="u-pass" class="inp" placeholder="Password (6-digits)">
        <button class="btn" style="width:100%; background:var(--cyan); color:#000;" onclick="start()">LOGIN</button>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <h3 style="color:var(--cyan)">MD ENGINE</h3>
        <div class="btn active" onclick="nav('p1', this)">🧩 ART BY CODE</div>
        <div class="btn" onclick="nav('p2', this)">🛡️ DEBUGGER</div>
        <div class="btn" onclick="nav('p3', this)">👤 PROFILE</div>
        <div class="btn" onclick="nav('p4', this)">🔑 PASS GEN</div>
    </div>

    <div class="main">
        <div id="p1" class="page active">
            <h2>Code-to-Art Laboratory</h2>
            <p>Write JS code to draw (Example: ctx.fillStyle='blue'; ctx.arc(100,100,50,0,7); ctx.fill();)</p>
            <textarea id="code-editor" placeholder="Write your drawing code here..."></textarea>
            <button class="btn" style="background:var(--pink); color:white; margin-top:10px" onclick="runArt()">RENDER ART</button>
            <canvas id="artCanvas" width="500" height="300"></canvas>
        </div>

        <div id="p2" class="page">
            <h2>AI Code Debugger</h2>
            <div class="debug-area">
                <textarea id="debug-input" class="inp" style="height:100px" placeholder="Paste code here to check..."></textarea>
                <button class="btn" style="background:var(--green); color:black" onclick="checkCode()">CHECK CODE</button>
                <div id="debug-output"></div>
            </div>
        </div>

        <div id="p3" class="page">
            <div class="debug-area" style="text-align:center">
                <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" width="100">
                <h1 id="prof-user" style="color:var(--cyan)">Rega</h1>
                <p>Status: Master Developer</p>
                <p>System Start: 4/12/2025</p>
            </div>
        </div>

        <div id="p4" class="page">
            <div class="debug-area">
                <h3>Server Password</h3>
                <div id="ps-box" style="font-size:20px; color:var(--green); margin:20px 0;">********</div>
                <button class="btn" onclick="genP()">GENERATE</button>
            </div>
        </div>
    </div>
</div>

<div id="bot-window">
    <div style="background:var(--cyan); color:#000; padding:10px; font-weight:bold;">MD BOT</div>
    <div id="msgs"></div>
    <input type="text" id="bot-in" class="inp" style="margin:5px;" placeholder="Say hi or ask for code..." onkeypress="if(event.key==='Enter') talk()">
</div>
<button style="position:fixed; bottom:20px; left:20px; width:60px; height:60px; border-radius:50%; background:var(--cyan); cursor:pointer;" onclick="toggleB()">🤖</button>

<script>
    function start() {
        const u = document.getElementById('u-name').value;
        const p = document.getElementById('u-pass').value;
        if(u && p.length>=6) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('prof-user').innerText = u;
            // ترحيب صوتي بسيط
            const speech = new SpeechSynthesisUtterance("Welcome " + u);
            window.speechSynthesis.speak(speech);
        }
    }

    function nav(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
    }

    // 🎨 الرسم بالكود
    function runArt() {
        const canvas = document.getElementById('artCanvas');
        const ctx = canvas.getContext('2d');
        const code = document.getElementById('code-editor').value;
        ctx.clearRect(0,0,500,300);
        try {
            eval(code); // تنفيذ الكود اللي بتكتبيه
        } catch(e) {
            alert("Error in Art Code: " + e.message);
        }
    }

    // 🛡️ تصحيح الأكواد
    function checkCode() {
        const code = document.getElementById('debug-input').value;
        const out = document.getElementById('debug-output');
        if(code.includes(";") || code.includes("{")) {
            out.style.color = "var(--green)";
            out.innerText = "✅ Code is Correct! Logic looks solid.";
        } else {
            out.style.color = "red";
            out.innerText = "❌ Error: Missing semi-colons or brackets. Suggestion: Check your syntax!";
        }
    }

    function genP() {
        let p = Math.random().toString(36).slice(-10) + Math.random().toString(36).toUpperCase().slice(-10);
        document.getElementById('ps-box').innerText = p;
    }

    function toggleB() { 
        const w = document.getElementById('bot-window');
        w.style.display = (w.style.display==='flex')?'none':'flex'; 
    }

    function talk() {
        const inp = document.getElementById('bot-in');
        const m = document.getElementById('msgs');
        const t = inp.value.toLowerCase();
        m.innerHTML += `<div><b>You:</b> ${inp.value}</div>`;
        
        let r = "I'm here to help, Rega!";
        if(t.includes("hi") || t.includes("hello")) r = "Welcome Back, Chief! How can I help you today?";
        if(t.includes("code")) r = "Sure! Try writing 'ctx.fillRect(10,10,100,100)' in the Art Lab.";
        if(t.includes("date")) r = "Our system started on 4/12/2025.";

        setTimeout(() => { m.innerHTML += `<div style="color:var(--cyan)"><b>Bot:</b> ${r}</div>`; m.scrollTop=m.scrollHeight; }, 300);
        inp.value = "";
    }
</script>
</body>
</html>
