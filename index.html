<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD STUDIO | SUPREME REFIX</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --green: #00ff88; --red: #ff3333; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* 1. حل مشكلة المربعات الطويلة */
        #login-screen { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: #000; gap: 20px; }
        .login-card { width: 300px; padding: 25px; background: #0a0a0f; border: 1px solid #222; border-radius: 15px; text-align: center; max-height: 80vh; }
        .matrix-box { width: 300px; height: 300px; background: #000; border: 1px solid #111; color: #0f8; padding: 15px; font-family: monospace; overflow: hidden; font-size: 12px; }

        .input-style { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 5px; }
        .btn-log { width: 100%; padding: 12px; background: #222; color: #555; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-log.active { background: var(--green); color: #000; box-shadow: 0 0 15px var(--green); }

        /* 2. الهيكل الداخلي - تنظيم الأقسام */
        #main-app { display: none; grid-template-columns: 200px 1fr; height: 100vh; }
        .sidebar { background: var(--dark); border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 10px; background: #111; color: #888; border: 1px solid #222; border-radius: 5px; cursor: pointer; text-align: left; font-size: 12px; }
        .nav-btn.active { background: var(--cyan); color: #000; }

        .tab-content { display: none; padding: 20px; height: 100vh; overflow-y: auto; }
        .active-tab { display: block; }

        /* 3. بوت AI */
        #ai-chat { position: fixed; bottom: 80px; left: 20px; width: 260px; height: 300px; background: #0a0a0f; border: 1px solid var(--cyan); display: none; flex-direction: column; border-radius: 10px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="matrix-box" id="matrix"></div>
    <div class="login-card">
        <h2 style="color:var(--cyan)">MD Studio</h2>
        <input type="text" id="name-in" class="input-style" placeholder="Your Name">
        <input type="text" id="pass-in" class="input-style" placeholder="6 Chars (ex: rita12)">
        <button id="entry-btn" class="btn-log" onclick="access('new')">CREATE ACCOUNT</button>
        <button onclick="access('old')" style="background:none; border:none; color:var(--cyan); margin-top:15px; cursor:pointer;">I have an account</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h4 style="color:var(--cyan)">MENU</h4>
        <div class="nav-btn active" onclick="show('tab1')">1. SCRATCH ENGINE</div>
        <div class="nav-btn" onclick="show('tab2')">2. DEBUGGER (تصحيح)</div>
        <div class="nav-btn" onclick="show('tab3')">3. PASS GENERATOR</div>
        <div class="nav-btn" onclick="show('tab4')">4. PROFILE</div>
    </div>

    <div class="content">
        <div id="tab1" class="tab-content active-tab">
            <h3>Full Scratch Workspace</h3>
            <div id="blocklyDiv" style="height: 500px; width: 100%; border:1px solid #333;"></div>
        </div>

        <div id="tab2" class="tab-content">
            <h3>Code Debugger</h3>
            <textarea id="code-area" class="input-style" style="height:150px;" placeholder="Paste code here..."></textarea>
            <button class="nav-btn" style="color:white" onclick="debug()">Analyze Code</button>
            <div id="debug-res" style="margin-top:20px; color:var(--green)"></div>
        </div>

        <div id="tab3" class="tab-content">
            <h3>Security Center</h3>
            <div style="background:#111; padding:20px; border-radius:10px;">
                <h2 id="pass-out">********</h2>
                <button class="nav-btn" onclick="gen()">Generate Strong Pass</button>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <h3>Account Settings</h3>
            <div style="text-align:center; padding:30px;">
                <div style="width:80px; height:80px; background:var(--cyan); border-radius:50%; margin:0 auto 10px;"></div>
                <h2 id="user-display">User</h2>
                <button class="btn-log active" style="background:var(--red); width:200px;" onclick="location.reload()">LOGOUT</button>
                <br><br>
                <button class="btn-log active" style="background:var(--red); width:200px;" onclick="localStorage.clear(); location.reload();">DELETE ACCOUNT</button>
            </div>
        </div>
    </div>
</div>

<div id="ai-btn" onclick="toggleAI()" style="position:fixed; bottom:20px; left:20px; width:50px; height:50px; background:var(--cyan); border-radius:50%; cursor:pointer;"></div>
<div id="ai-chat">
    <div style="padding:10px; background:var(--cyan); color:black;">MD Assistant</div>
    <div id="msgs" style="flex:1; padding:10px; overflow-y:auto; font-size:12px;"></div>
    <input type="text" id="ai-text" onkeypress="if(event.key==='Enter') aiSend()" placeholder="Ask me..." style="width:100%; padding:10px; background:#000; color:white; border:none;">
</div>

<script>
    // مصفوفة المربع الأسود
    const m = document.getElementById('matrix');
    setInterval(() => { m.innerHTML += "> System Check... OK<br>"; if(m.innerText.length > 500) m.innerHTML = ""; }, 2000);

    // التحقق من الباسورد (6 خانات ميكس)
    document.getElementById('pass-in').addEventListener('input', function() {
        const v = this.value;
        const ok = v.length === 6 && /[0-9]/.test(v) && /[a-z]/i.test(v);
        document.getElementById('entry-btn').className = ok ? "btn-log active" : "btn-log";
    });

    // الدخول
    function access(type) {
        let name = document.getElementById('name-in').value;
        let pass = document.getElementById('pass-in').value;

        if(type === 'old') {
            const saved = JSON.parse(localStorage.getItem('md_user'));
            if(!saved) return alert("No account found!");
            const checkName = prompt("Enter Name:");
            const checkPass = prompt("Enter Password:");
            if(checkName === saved.name && checkPass === saved.pass) {
                name = saved.name;
                alert("Welcome Back!");
            } else { return alert("Wrong credentials!"); }
        } else {
            if(pass.length !== 6) return;
            localStorage.setItem('md_user', JSON.stringify({name: name, pass: pass}));
        }
        
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        document.getElementById('user-display').innerText = name;
        
        // صوت ترحيب
        const msg = new SpeechSynthesisUtterance((type==='old'?'Welcome back ':'Welcome ') + name);
        window.speechSynthesis.speak(msg);
        
        // تشغيل سكراتش
        Blockly.inject('blocklyDiv', {toolbox: '<xml><block type="controls_repeat_ext"></block></xml>', theme: Blockly.Themes.Dark});
    }

    // تبديل الأقسام
    function show(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(id).classList.add('active-tab');
    }

    // وظائف إضافية
    function gen() { document.getElementById('pass-out').innerText = Math.random().toString(36).slice(-10).toUpperCase(); }
    function debug() { document.getElementById('debug-res').innerText = "Analyzing... [System]: All codes are optimized!"; }
    function toggleAI() { let c = document.getElementById('ai-chat'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; }
    function aiSend() {
        const txt = document.getElementById('ai-text');
        const m = document.getElementById('msgs');
        m.innerHTML += "<div>You: " + txt.value + "</div>";
        setTimeout(() => { m.innerHTML += "<div style='color:var(--cyan)'>AI: I am online. How can I assist you, Rega?</div>"; }, 500);
        txt.value = "";
    }
</script>
</body>
</html>
