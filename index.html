<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made with Retaj | MD Studio Pro</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* 📱 تصميم متجاوب (Responsive) للموبايل والكمبيوتر */
        #main-app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        @media (max-width: 768px) { 
            #main-app { grid-template-columns: 1fr; } 
            .sidebar { padding: 10px; border-right: none; border-bottom: 2px solid #1a1a25; }
        }

        .sidebar { background: #080810; border-right: 2px solid #1a1a25; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; cursor: pointer; color: #777; font-weight: bold; transition: 0.3s; text-align: center; }
        .nav-link.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .content-view { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* 🎨 سكراتش */
        #blocklyDiv { height: 65vh; width: 100%; border-radius: 15px; border: 1px solid #222; }

        /* 🤖 AI Debugger Box */
        #dbg-status { margin-top: 15px; padding: 15px; background: #0a0a15; border-radius: 12px; border: 1px dashed var(--cyan); white-space: pre-wrap; font-size: 14px; }
        .input-style { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 8px; outline: none; box-sizing: border-box; }

        .made-by { position: fixed; bottom: 15px; right: 20px; color: var(--cyan); font-weight: bold; font-family: 'Courier New', monospace; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center;">
    <div style="background:#0a0a15; padding:40px; border:2px solid var(--cyan); border-radius:20px; text-align:center; width:320px;">
        <h2 style="color:var(--cyan)">MADE WITH RETAJ</h2>
        <input type="text" id="user-input" class="input-style" placeholder="Enter Name">
        <input type="password" id="pass-input" class="input-style" placeholder="Enter Password">
        <button class="nav-link" style="width:100%; color:cyan" onclick="access()">LOGIN</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h2 style="color:var(--cyan); font-size: 18px;">RETAJ STUDIO</h2>
        <div class="nav-link active" onclick="showPage('p1', this)">🧩 SCRATCH</div>
        <div class="nav-link" onclick="showPage('p2', this)">🎨 ART LAB</div>
        <div class="nav-link" onclick="showPage('p4', this)">🛡️ AI DEBUGGER</div>
        <div class="nav-link" onclick="showPage('p3', this)">👤 PROFILE</div>
    </div>

    <div class="content-view">
        <div id="p1" class="page active">
            <h1>Scratch Engine (Made with Retaj)</h1>
            <div id="blocklyDiv"></div>
        </div>

        <div id="p4" class="page">
            <h1>🛡️ AI Intelligent Debugger</h1>
            <p style="color: #888;">Powered by Gemini AI Technology</p>
            <textarea id="dbg-input" class="input-style" style="height:150px" placeholder="Paste your broken code here..."></textarea>
            <button class="nav-link" style="color:var(--green); width: 220px;" onclick="runAIDebug()">ANALYSIS BY AI</button>
            <div id="dbg-status">Status: Waiting for code...</div>
        </div>

        <div id="p3" class="page">
            <div style="text-align:center; background:#0a0a15; padding:30px; border-radius:20px; border:1px solid #222; max-width:400px; margin:auto;">
                <img id="avatar-img" src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" style="width:100px; border-radius:50%; border:3px solid var(--cyan);">
                <h2 id="display-username" style="color:var(--cyan)">Retaj</h2>
                <button class="nav-link" style="width:100%; background:var(--green); color:black">SAVE UPDATES</button>
            </div>
        </div>
    </div>
</div>

<div class="made-by">Made with Retaj</div>

<script>
    let currentAdmin = "mabe with retaj";
    const GEMINI_KEY = "AIzaSyA4FGIf0tWe1JqEaDHoVRXHpiEJlMByDKE"; // مفتاح ريتاج الأصلي

    function access() {
        const u = document.getElementById('user-input').value;
        if(u) {
            currentAdmin = u;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('display-username').innerText = u;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome " + u));
            initScratch();
        }
    }

    async function runAIDebug() {
        const codeInput = document.getElementById('dbg-input').value;
        const statusDiv = document.getElementById('dbg-status');
        if(!codeInput) return alert("Please paste code first!");

        statusDiv.innerText = "🧠 AI is analyzing your code... please wait.";
        statusDiv.style.color = "var(--cyan)";

        try {
            // استخدام رابط الـ API المحدث للاتصال المستقر
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Fix this code and explain the errors briefly: " + codeInput }] }] })
            });
            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            statusDiv.innerText = result;
            statusDiv.style.color = "white";
        } catch (e) {
            statusDiv.innerText = "❌ Connection Error. Check your internet or API key status.";
            statusDiv.style.color = "red";
        }
    }

    function initScratch() {
        const tb = `<xml><category name="Logic" colour="210"><block type="controls_if"></block></category></xml>`;
        Blockly.inject('blocklyDiv', {toolbox: tb, theme: Blockly.Themes.Dark});
        Blockly.svgResize(Blockly.mainWorkspace);
    }

    function showPage(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
        if(id === 'p1') { setTimeout(() => { Blockly.svgResize(Blockly.mainWorkspace); }, 50); }
    }
</script>
</body>
</html>
