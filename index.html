<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD-Empire | The Final Frontier</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --cyan: #00f2ff; 
            --pink: #ff007f; 
            --dark: #020205; 
            --glass: rgba(0, 242, 255, 0.05); 
            --neon-glow: 0 0 15px var(--cyan);
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--dark); 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            overflow: hidden; 
        }

        h1, .neon-font { font-family: 'Orbitron', sans-serif; text-shadow: var(--neon-glow); }
        
        /* 🌌 خلفية النجوم المتحركة المحسنة */
        #stars-container { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0a0a1a, #000); }
        .star { position: absolute; background: white; border-radius: 50%; animation: moveStars linear infinite; }
        @keyframes moveStars { from { transform: translateY(0); } to { transform: translateY(-100vh); } }

        /* 📱 تقسيم الواجهة (لحل مشكلة "العشوائية") */
        .viewport { display: grid; grid-template-rows: 70px 1fr 50px; height: 100vh; padding: 10px; box-sizing: border-box; gap: 10px; }
        
        header { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); 
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 12px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; box-shadow: var(--neon-glow);
        }

        .main-engine { display: grid; grid-template-columns: 1fr 380px; gap: 15px; overflow: hidden; }

        /* 🛠️ منطقة المحرر (لحل مشكلة "المربعات الطويلة") */
        .editor-container { 
            background: var(--glass); border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .CodeMirror { height: 100%; font-size: 14px; background: rgba(0,0,0,0.5) !important; }

        /* 🖼️ الـ Stage المرتب جنباً إلى جنب */
        .stage-container { display: grid; grid-template-rows: 1fr 150px 60px; gap: 10px; }
        .stage { 
            background: #fff; border-radius: 15px; border: 3px solid var(--cyan); 
            position: relative; overflow: hidden; box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); 
        }
        #sprite { position: absolute; width: 60px; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: all 0.5s ease; }

        /* 🛑 زر الـ RUN الجديد (مثل الصورة) */
        .btn-run-circle { 
            width: 50px; height: 50px; background: #ee1c25; 
            border-radius: 50%; border: none; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-size: 20px; transition: 0.3s;
            box-shadow: 0 0 15px rgba(238, 28, 37, 0.5);
        }
        .btn-run-circle:hover { transform: scale(1.1); box-shadow: 0 0 25px #ee1c25; }

        /* 👤 البروفايل ونسخ الرابط */
        .header-icons { display: flex; align-items: center; gap: 15px; }
        .icon-btn { background: none; border: none; color: var(--cyan); cursor: pointer; font-size: 18px; transition: 0.3s; }
        .icon-btn:hover { color: white; text-shadow: var(--neon-glow); }

        #console { background: #000; color: var(--pink); border-radius: 10px; border: 1px solid var(--pink); padding: 10px; font-family: monospace; font-size: 12px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="stars-container"></div>

<div class="viewport">
    <header>
        <div class="neon-font" style="font-size: 20px; color: var(--cyan);">MD-STUDIO <span style="font-size:10px; color:white;">EMPIRE v20.0</span></div>
        <div class="header-icons">
            <div style="background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:8px; border:1px solid #333; font-size:12px;">
                🔑 Secure: <span id="strong-pass" style="color:var(--cyan)">********</span>
            </div>
            <button class="icon-btn" onclick="copyProjectLink()" title="Copy Project Link"><i class="fas fa-copy"></i></button>
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Multidisciplinary" style="width:40px; border-radius:50%; border:2px solid var(--cyan); cursor:pointer;">
        </div>
    </header>

    <div class="main-engine">
        <div class="editor-container">
            <div style="padding:10px; background:rgba(0,0,0,0.3); display:flex; gap:15px; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span class="neon-font" style="font-size:12px; color:var(--cyan);">SCRATCH LAB</span>
            </div>
            <textarea id="code-editor"></textarea>
        </div>

        <div class="stage-container">
            <div class="stage">
                <img id="sprite" src="https://openclipart.org/image/800px/217242">
            </div>
            <div id="console">[SYSTEM]: Welcome, Multidisciplinary Developer. Empire Online.</div>
            
            <div style="display:flex; justify-content:center; align-items:center;">
                <button class="btn-run-circle" onclick="runProject()"><i class="fas fa-play"></i></button>
            </div>
        </div>
    </div>
    
    <footer style="background:var(--glass); border-top:1px solid rgba(255,255,255,0.05); border-radius:10px; display:flex; align-items:center; padding:0 20px; font-size:11px; color:#888;">
        System v20.0 Online | Connected to MD-AI Assistant
    </footer>
</div>

<script>
    // 🌌 توليد النجوم
    const starsContainer = document.getElementById('stars-container');
    for(let i=0; i<100; i++) {
        let star = document.createElement('div'); star.className = 'star';
        let size = Math.random() * 2.5 + 'px'; star.style.width = size; star.style.height = size;
        star.style.left = Math.random() * 100 + 'vw'; star.style.top = Math.random() * 100 + 'vh';
        star.style.animationDuration = (Math.random() * 4 + 2) + 's'; starsContainer.appendChild(star);
    }

    // 🛠️ تفعيل CodeMirror (لحل مشكلة "المربعات العشوائية")
    const editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
        mode: 'xml', theme: 'default', lineNumbers: true, htmlMode: true
    });
    editor.setValue('\n<h1 style="color:blue">Hello MD!</h1>\n<style>\n body { text-align: center; background: white; }\n</style>');

    // 🚀 تنفيذ المشروع (التحريك الحقيقي)
    function runProject() {
        const sprite = document.getElementById('sprite');
        sprite.style.transform = 'translate(calc(-50% + 50px), -50%)'; // تحريك بسيط للتجربة
        
        const con = document.getElementById('console');
        con.innerHTML += `<br><span style="color:#0f8">[SUCCESS]: Sprite moved 50px ✅</span>`;
        con.scrollTop = con.scrollHeight;
    }

    // 🔗 نسخ الرابط (الميزة الجديدة)
    function copyProjectLink() {
        const code = btoa(editor.getValue());
        const link = window.location.origin + "?share=" + code;
        navigator.clipboard.writeText(link).then(() => {
            alert("Project link copied to clipboard! 🔗");
        });
    }
</script>

</body>
</html>
