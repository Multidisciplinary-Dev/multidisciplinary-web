<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Ultimate Studio | Professional IDE</title>
    
    <meta property="og:title" content="MD Ultimate Studio">
    <meta property="og:image" content="https://i.postimg.cc/85zX6F6z/md-logo-pro.png"> <meta property="og:description" content="Professional Web & Python Editor.">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/css/css.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

    <style>
        :root { --accent: #00d2ff; --bg: #0b0e14; }
        body { background: var(--bg); color: white; margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Nav & Tabs */
        nav { background: #000; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--accent); }
        .tabs button { background: #1a1a2e; border: 1px solid #333; color: white; padding: 8px 20px; cursor: pointer; border-radius: 5px; margin-right: 5px; }
        .tabs button.active { background: var(--accent); color: black; font-weight: bold; }

        /* Workspace Layout */
        .workspace { flex: 1; display: flex; overflow: hidden; }
        .editors { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .viewer { flex: 1; background: white; position: relative; }
        
        .CodeMirror { height: 100% !important; font-size: 14px; }
        iframe { width: 100%; height: 100%; border: none; }
        #console { background: #000; color: #b2ff59; padding: 15px; font-family: monospace; overflow-y: auto; height: 100%; display: none; }

        .run-btn { background: #00c853; border: none; padding: 10px 30px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<nav>
    <div class="tabs">
        <button id="web-tab" class="active" onclick="switchMode('web')">Web Editor (HTML/JS)</button>
        <button id="py-tab" onclick="switchMode('python')">Python Engine</button>
    </div>
    <button class="run-btn" onclick="runProject()">▶ RUN</button>
</nav>

<div class="workspace">
    <div class="editors">
        <div id="web-editors-group" style="height: 100%; display: flex; flex-direction: column;">
            <div style="height: 33.3%"><textarea id="html-code"><h1>Hello World</h1></textarea></div>
            <div style="height: 33.3%"><textarea id="css-code">h1 { color: red; }</textarea></div>
            <div style="height: 33.3%"><textarea id="js-code">console.log("Web Mode Active");</textarea></div>
        </div>
        <div id="python-editor-group" style="height: 100%; display: none;">
            <textarea id="python-code">print("Hello from MD Python Engine!")
import math
print(f"Square root of 16 is {math.sqrt(16)}")</textarea>
        </div>
    </div>

    <div class="viewer">
        <iframe id="web-preview"></iframe>
        <div id="console">Initializing Python... Wait a moment.</div>
    </div>
</div>

<script>
    // 1. Initialize CodeMirror for all languages
    const config = { theme: "dracula", lineNumbers: true, indentUnit: 4 };
    const htmlEditor = CodeMirror.fromTextArea(document.getElementById('html-code'), { ...config, mode: "xml" });
    const cssEditor = CodeMirror.fromTextArea(document.getElementById('css-code'), { ...config, mode: "css" });
    const jsEditor = CodeMirror.fromTextArea(document.getElementById('js-code'), { ...config, mode: "javascript" });
    const pyEditor = CodeMirror.fromTextArea(document.getElementById('python-code'), { ...config, mode: "python" });

    // 2. Python Engine (Pyodide) Setup
    let pyodide;
    async function loadPy() {
        pyodide = await loadPyodide();
        document.getElementById('console').innerText = ">>> Python Ready. Write code and press RUN.";
    }
    loadPy();

    // 3. Tab Switching Script
    function switchMode(mode) {
        const webGroup = document.getElementById('web-editors-group');
        const pyGroup = document.getElementById('python-editor-group');
        const iframe = document.getElementById('web-preview');
        const consoleDiv = document.getElementById('console');

        document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));

        if(mode === 'web') {
            webGroup.style.display = 'flex'; pyGroup.style.display = 'none';
            iframe.style.display = 'block'; consoleDiv.style.display = 'none';
            document.getElementById('web-tab').classList.add('active');
        } else {
            webGroup.style.display = 'none'; pyGroup.style.display = 'block';
            iframe.style.display = 'none'; consoleDiv.style.display = 'block';
            document.getElementById('py-tab').classList.add('active');
            pyEditor.refresh(); // Refresh CodeMirror after unhide
        }
    }

    // 4. Run Function (Hybrid Web + Python)
    async function runProject() {
        const activeMode = document.getElementById('web-tab').classList.contains('active') ? 'web' : 'py';

        if(activeMode === 'web') {
            const html = htmlEditor.getValue();
            const css = `<style>${cssEditor.getValue()}</style>`;
            const js = `<script>${jsEditor.getValue()}<\/script>`;
            const output = document.getElementById('web-preview').contentWindow.document;
            output.open();
            output.write(html + css + js);
            output.close();
        } else {
            const code = pyEditor.getValue();
            const consoleDiv = document.getElementById('console');
            consoleDiv.innerText = "Running...\n";
            try {
                pyodide.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                `);
                await pyodide.runPythonAsync(code);
                const stdout = pyodide.runPython("sys.stdout.getvalue()");
                consoleDiv.innerText += stdout + "\n>>> Execution Complete.";
            } catch (err) {
                consoleDiv.innerText += "❌ Error: " + err;
            }
        }
    }
</script>
</body>
</html>
