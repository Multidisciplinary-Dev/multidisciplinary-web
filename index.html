<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made with Retaj | MD Studio Professional</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* 📱 Responsive Grid System */
        #main-app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        @media (max-width: 768px) { 
            #main-app { grid-template-columns: 1fr; } 
            .sidebar { padding: 10px; border-right: none; border-bottom: 2px solid #1a1a25; }
            .nav-link { font-size: 12px; padding: 10px; }
        }

        .sidebar { background: #080810; border-right: 2px solid #1a1a25; padding: 25px; display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .nav-link { padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; cursor: pointer; color: #777; font-weight: bold; transition: 0.3s; text-align: center; }
        .nav-link.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .content-view { flex: 1; padding: 30px; overflow-y: auto; position: relative; }
        .page { display: none; }
        .page.active { display: block; }

        /* 🎨 سكراتش */
        #blocklyDiv { height: 65vh; width: 100%; border-radius: 15px; border: 1px solid #222; }

        /* 🤖 AI Debugger Styles */
        #dbg-status { margin-top: 15px; padding: 15px; background: #0a0a15; border-radius: 12px; border: 1px dashed var(--cyan); white-space: pre-wrap; line-height: 1.6; }

        /* 👤 البروفايل */
        .profile-container { background: #0a0a15; padding: 30px; border-radius: 20px; border: 1px solid #222; max-width: 500px; margin: auto; text-align: center; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--cyan); object-fit: cover; margin-bottom: 10px; }

        .made-by { position: fixed; bottom: 15px; right: 20px; color: var(--cyan); font-weight: bold; font-family: 'Courier New', monospace; font-size: 14px; pointer-events: none; }

        #bot-window { position: fixed; bottom: 80px; left: 20px; width: 280px; height: 350px; background: #0a0a0f; border: 2px solid var(--cyan); border-radius: 20px; display: none; flex-direction: column; overflow: hidden; z-index: 1000; }
        #chat-logs { flex: 1; padding: 15px; overflow-y: auto; background: #05050a; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--cyan)">MADE WITH RETAJ</h2>
        <input type="text" id="user-input" class="input-style" placeholder="Enter Name">
        <input type="password" id="pass-input" class="input-style" placeholder="Enter Password">
        <button class="nav-link" style="width:100%; color:cyan" onclick="access()">LOGIN</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h2 style="color:var(--cyan); font-size: 18px;">RETAJ STUDIO</h2>
        <div class="nav-link active" onclick="showPage('p1', this)">🧩 SCRATCH</div>
        <div class="nav-link" onclick="showPage('p2', this)">🎨 ART LAB</div>
        <div class="nav-link" onclick="showPage('p4', this)">🛡️ AI DEBUGGER</div>
        <div class="nav-link" onclick="showPage('p3', this)">👤 PROFILE</div>
    </div>

    <div class="content-view">
        <div id="p1" class="page active">
            <h1>Scratch Engine</h1>
            <div id="blocklyDiv"></div>
        </div>

        <div id="p2" class="page">
            <h1>Art Laboratory</h1>
            <textarea id="art-input" class="input-style" style="height:80px; color:var(--green)" placeholder="Type 'circle' or JS..."></textarea>
            <button class="nav-link" style="color:var(--pink); width: 150px;" onclick="render()">RENDER</button>
            <canvas id="main-canvas" width="400" height="250" style="background:white; margin-top:15px; border-radius:15px; width: 100%; max-width: 500px;"></canvas>
        </div>

        <div id="p3" class="page">
            <div class="profile-container">
                <img id="avatar-img" src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" class="profile-img">
                <h2 id="display-username" style="color:var(--cyan)">Retaj</h2>
                <input type="text" id="edit-name" class="input-style" placeholder="New Name">
                <input type="text" id="edit-img" class="input-style" placeholder="Image Link">
                <button class="nav-link" style="width:100%; background:var(--green); color:black" onclick="saveProfile()">SAVE CHANGES</button>
            </div>
        </div>

        <div id="p4" class="page">
            <h1>🛡️ AI Intelligent Debugger</h1>
            <p style="color: #888;">Professional Code Analysis Powered by Gemini</p>
            <textarea id="dbg-input" class="input-style" style="height:150px" placeholder="Paste your broken code here..."></textarea>
            <button class="nav-link" style="color:var(--green); width: 200px;" onclick="runAIDebug()">ANALYSIS BY AI</button>
            <div id="dbg-status">Status: Waiting for code...</div>
        </div>
    </div>
</div>

<div class="made-by">Made with Retaj</div>

<button style="position:fixed; bottom:20px; left:20px; width:50px; height:50px; border-radius:50%; background:var(--cyan); border:none; cursor:pointer; z-index: 1001;" onclick="toggleBot()">🤖</button>
<div id="bot-window">
    <div style="background:var(--cyan); color:black; padding:10px; font-weight:bold;">RETAJ BOT</div>
    <div id="chat-logs"></div>
    <input type="text" id="chat-input" class="input-style" style="margin:5px" placeholder="Say hi..." onkeypress="if(event.key==='Enter') botTalk()">
</div>

<script>
    let currentAdmin = "mabe with retaj";
    const GEMINI_KEY = "AIzaSyA4FGIf0tWe1JqEaDHoVRXHpiEJlMByDKE"; // مفتاح ريتاج السري

    function access() {
        const u = document.getElementById('user-input').value;
        if(u) {
            currentAdmin = u;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('display-username').innerText = u;
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome " + u));
            initScratch();
        }
    }

    async function runAIDebug() {
        const codeInput = document.getElementById('dbg-input').value;
        const statusDiv = document.getElementById('dbg-status');
        if(!codeInput) return alert("Please paste code first!");

        statusDiv.innerText = "🧠 AI is analyzing your code... Please wait.";
        statusDiv.style.color = "var(--cyan)";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "You are a professional debugger. Fix this code and explain the errors in simple terms: " + codeInput }] }] })
            });
            const data = await response.json();
            const aiResult = data.candidates[0].content.parts[0].text;
            statusDiv.innerText = aiResult;
            statusDiv.style.color = "white";
        } catch (e) {
            statusDiv.innerText = "❌ Connection Error. Check your API key or internet.";
            statusDiv.style.color = "red";
        }
    }

    function saveProfile() {
        const n = document.getElementById('edit-name').value;
        const i = document.getElementById('edit-img').value;
        if(n) { currentAdmin = n; document.getElementById('display-username').innerText = n; }
        if(i) { document.getElementById('avatar-img').src = i; }
        alert("Success! Made with Retaj.");
    }

    function initScratch() {
        const tb = `<xml>
            <category name="Logic" colour="210"><block type="controls_if"></block></category>
            <category name="Loops" colour="120"><block type="controls_repeat_ext"></block></category>
            <category name="Math" colour="230"><block type="math_number"></block></category>
            <category name="Variables" colour="330" custom="VARIABLE"></category>
            <category name="Text" colour="160"><block type="text"></block></category>
        </xml>`;
        Blockly.inject('blocklyDiv', {toolbox: tb, theme: Blockly.Themes.Dark});
        Blockly.svgResize(Blockly.mainWorkspace);
    }

    function showPage(id, b) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
        if(id === 'p1') { setTimeout(() => { Blockly.svgResize(Blockly.mainWorkspace); }, 50); }
    }

    function render() {
        const ctx = document.getElementById('main-canvas').getContext('2d');
        const code = document.getElementById('art-input').value.toLowerCase();
        ctx.clearRect(0,0,400,250);
        if(code.includes('circle')) { ctx.beginPath(); ctx.arc(150,75,50,0,7); ctx.fill(); }
        else { try { eval(code); } catch(e) { alert("Code Error"); } }
    }

    function toggleBot() { const b = document.getElementById('bot-window'); b.style.display = (b.style.display==='flex')?'none':'flex'; }
    function botTalk() {
        const i = document.getElementById('chat-input'); const m = document.getElementById('chat-logs');
        m.innerHTML += `<div><b>You:</b> ${i.value}</div>`;
        let r = "I am ready, " + currentAdmin;
        if(i.value.toLowerCase().includes("hi")) r = "Hello Chief Retaj! Let's build something amazing.";
        setTimeout(() => { m.innerHTML += `<div style="color:cyan"><b>Bot:</b> ${r}</div>`; m.scrollTop=m.scrollHeight; }, 300);
        i.value = "";
    }
</script>
</body>
</html>
