<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD Studio | Ultimate Space</title>
    <style>
        :root { --accent: #00d2ff; --err: #ff4d4d; --dark: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 🌌 خلفية الفضاء والماتريكس */
        canvas { position: fixed; inset: 0; z-index: -1; }

        /* 🔐 شاشة الدخول */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.7); }
        .login-card { background: rgba(10, 10, 25, 0.95); padding: 40px; border: 2px solid var(--accent); border-radius: 20px; width: 320px; text-align: center; box-shadow: 0 0 20px var(--accent); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--accent); border-radius: 8px; box-sizing: border-box; outline: none; }
        
        /* 🔴 الرسالة الحمراء تحت الباسورد فوراً */
        .error-hint { color: var(--err); font-size: 12px; text-align: left; min-height: 18px; font-weight: bold; margin-bottom: 10px; }

        /* 📱 الواجهة الرئيسية */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .sidebar { width: 220px; background: rgba(0,0,0,0.9); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .nav-item { padding: 12px; cursor: pointer; border: 1px solid #333; border-radius: 10px; text-align: center; transition: 0.3s; }
        .nav-item.active, .nav-item:hover { background: var(--accent); color: #000; font-weight: bold; }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* 🎮 محرك التاتش */
        #game-area { height: 400px; background: rgba(255,255,255,0.05); border: 1px solid #444; border-radius: 15px; position: relative; overflow: hidden; touch-action: none; }
        .item { position: absolute; font-size: 50px; cursor: move; touch-action: none; user-select: none; }
    </style>
</head>
<body>

<canvas id="spaceCanvas"></canvas>

<div id="auth-screen">
    <div class="login-card">
        <h2 style="color:var(--accent)">MD STUDIO</h2>
        <input type="text" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password (6 Chars)" oninput="validatePass()">
        <div id="errMsg" class="error-hint"></div>
        <button id="loginBtn" onclick="openApp()" disabled style="width:100%; padding:15px; background:#222; border:none; color:#555; border-radius:10px; cursor:not-allowed; font-weight:bold;">LAUNCH</button>
    </div>
</div>

<div id="main-app">
    <nav style="padding:15px; border-bottom:2px solid var(--accent); background:#000; font-weight:bold; color:var(--accent);">MD STUDIO | EMPIRE</nav>
    <div style="display:flex; flex:1;">
        <div class="sidebar">
            <div class="nav-item active" onclick="showPage('game-page', this)">🎮 Engine</div>
            <div class="nav-item" onclick="showPage('profile-page', this)">👤 Profile</div>
            <button onclick="location.reload()" style="margin-top:auto; background:#ff0080; border:none; padding:10px; color:white; border-radius:5px;">Logout</button>
        </div>
        <div class="content">
            <div id="game-page" class="page active">
                <h2>Game Engine (Touch Support)</h2>
                <button onclick="spawn('🚀')">Add Ship</button> <button onclick="spawn('👾')">Add Enemy</button>
                <div id="game-area" style="margin-top:20px;"></div>
            </div>
            <div id="profile-page" class="page">
                <div style="text-align:center; border:1px solid var(--accent); padding:40px; border-radius:20px; background:#0a0a0a;">
                    <div style="width:100px; height:100px; background:var(--accent); border-radius:50%; margin:auto; margin-bottom:20px;"></div>
                    <h1>Multidisciplinary Developer</h1>
                    <p style="color:var(--accent)">System Administrator</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 🌌 خلفية الفضاء
    const canvas = document.getElementById('spaceCanvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize; resize();

    function drawSpace() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00d2ff"; ctx.font = "15px monospace";
        for(let i=0; i<20; i++) {
            ctx.fillText(Math.random() > 0.5 ? "1" : "0", Math.random()*canvas.width, Math.random()*canvas.height);
        }
    } setInterval(drawSpace, 50);

    // 🔐 فحص الباسورد (الرسالة الحمراء)
    function validatePass() {
        const p = document.getElementById('passInput').value;
        const m = document.getElementById('errMsg');
        const b = document.getElementById('loginBtn');
        const hasChar = /[a-zA-Z]/.test(p);
        const hasSym = /[!@#$%^&*]/.test(p);

        if(p.length === 0) m.innerText = "";
        else if(p.length < 6) m.innerText = "❌ Too Short! (Must be 6)";
        else if(p.length > 6) m.innerText = "❌ Too Long! (Must be 6)";
        else if(!hasChar || !hasSym) m.innerText = "❌ Need Letters & Symbols";
        else {
            m.innerHTML = "<span style='color:#00ff88'>✅ Ready!</span>";
            b.disabled = false; b.style.background = "#00d2ff"; b.style.color = "#000"; b.style.cursor = "pointer";
            return;
        }
        b.disabled = true; b.style.background = "#222"; b.style.color = "#555"; b.style.cursor = "not-allowed";
    }

    function openApp() { document.getElementById('auth-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; }
    
    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // 🎮 سحب العناصر (تاتش وماوس)
    function spawn(emoji) {
        const d = document.createElement('div'); d.className = 'item'; d.innerText = emoji;
        d.style.left = '50px'; d.style.top = '50px';
        const move = (e) => {
            e.preventDefault(); const pt = e.touches ? e.touches[0] : e;
            const r = document.getElementById('game-area').getBoundingClientRect();
            d.style.left = (pt.clientX - r.left - 25) + 'px';
            d.style.top = (pt.clientY - r.top - 25) + 'px';
        };
        d.onmousedown = d.ontouchstart = () => { window.onmousemove = window.ontouchmove = move; };
        window.onmouseup = window.ontouchend = () => { window.onmousemove = window.ontouchmove = null; };
        document.getElementById('game-area').appendChild(d);
    }
</script>
</body>
</html>
