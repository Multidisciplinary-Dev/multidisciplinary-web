<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>MD STUDIO | OFFICIAL REGA SYSTEM</title>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }

        /* 🔐 Login Screen */
        #gate { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .gate-card { border: 2px solid var(--cyan); padding: 40px; border-radius: 20px; text-align: center; background: #0a0a15; box-shadow: 0 0 30px var(--cyan); }
        .gate-inp { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 5px; outline: none; }

        /* 📱 Main Layout */
        #shell { display: none; height: 100vh; width: 100vw; flex-direction: row; }
        .dock { width: 250px; background: #080810; border-right: 2px solid #111; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 15px; background: #111; border: 1px solid #222; border-radius: 10px; cursor: pointer; color: #666; font-weight: bold; }
        .nav-item.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .view { flex: 1; padding: 30px; overflow-y: auto; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* 🛠️ Debugger & Code Art */
        .console { background: #0a0a0f; border: 1px solid #333; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        #code-input { width: 100%; height: 100px; background: #000; color: var(--green); border: 1px solid #222; padding: 10px; font-family: monospace; }
        #draw-zone { background: white; border-radius: 10px; margin-top: 15px; width: 100%; height: 300px; }
        #debug-status { padding: 10px; margin-top: 10px; border-radius: 5px; font-weight: bold; }

        /* 🤖 Bot */
        #bot-box { position: fixed; bottom: 20px; left: 20px; width: 300px; height: 400px; background: #0a0a15; border: 2px solid var(--cyan); border-radius: 20px; display: none; flex-direction: column; overflow: hidden; z-index: 500; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="gate-card">
        <h2 style="color:var(--cyan)">AUTHORIZED ACCESS ONLY</h2>
        <input type="text" id="admin-name" class="gate-inp" placeholder="Admin Name">
        <input type="password" id="admin-pass" class="gate-inp" placeholder="6-Digit Pass">
        <button class="nav-item" style="width:100%; color:cyan" onclick="unlock()">ACCESS SYSTEM</button>
    </div>
</div>

<div id="shell">
    <div class="dock">
        <h2 style="color:var(--cyan)">MD STUDIO</h2>
        <div class="nav-item active" onclick="tab('s1', this)">🧩 CODE TO ART</div>
        <div class="nav-item" onclick="tab('s2', this)">🛡️ AI DEBUGGER</div>
        <div class="nav-item" onclick="tab('s3', this)">👤 PROFILE</div>
        <div class="nav-item" onclick="tab('s4', this)">🔑 SECURITY</div>
    </div>

    <div class="view">
        <div id="s1" class="screen active">
            <h1>Code Art Laboratory</h1>
            <div class="console">
                <textarea id="code-input" placeholder="Type: circle or square... or write JS code"></textarea>
                <button class="nav-item" style="color:var(--pink); margin-top:10px" onclick="render()">RUN CODE</button>
                <canvas id="draw-zone"></canvas>
            </div>
        </div>

        <div id="s2" class="screen">
            <h1>AI Debugger System</h1>
            <div class="console">
                <textarea id="debug-inp" style="height:150px; width:100%; background:#000; color:cyan; border:1px solid #222;" placeholder="Paste your code here..."></textarea>
                <button class="nav-item" style="color:var(--green); margin-top:10px" onclick="debug()">CHECK LOGIC</button>
                <div id="debug-status">Waiting for code...</div>
            </div>
        </div>

        <div id="s3" class="screen">
            <div class="console" style="text-align:center">
                <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" width="120">
                <h1 id="user-title" style="color:var(--cyan)">Rega</h1>
                <p>Access Level: <b>Root Admin</b></p>
                <p>System Initialized: <b>4/12/2025</b></p>
                <p>Status: <span style="color:var(--green)">Active</span></p>
            </div>
        </div>

        <div id="s4" class="screen">
            <div class="console">
                <h2>Server Security</h2>
                <div id="p-out" style="font-size:20px; color:var(--green); margin:20px 0;">********</div>
                <button class="nav-item" onclick="gen()">GENERATE STRONG PASS</button>
            </div>
        </div>
    </div>
</div>

<div id="bot-box">
    <div style="background:var(--cyan); color:#000; padding:10px; font-weight:bold;">MD-BOT</div>
    <div id="messages"></div>
    <input type="text" id="chat-in" class="gate-inp" style="margin:5px" placeholder="Hi or Code?" onkeypress="if(event.key==='Enter') talk()">
</div>
<button style="position:fixed; bottom:20px; left:20px; width:65px; height:65px; border-radius:50%; background:var(--cyan); cursor:pointer; font-size:30px; border:none;" onclick="toggleBot()">🤖</button>

<script>
    // 1. الدخول والترحيب
    function unlock() {
        const u = document.getElementById('admin-name').value;
        const p = document.getElementById('admin-pass').value;
        if(u && p.length >= 6) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('shell').style.display = 'flex';
            document.getElementById('user-title').innerText = u;
            // صوت الترحيب المظبوط
            const speak = new SpeechSynthesisUtterance("Welcome " + u);
            window.speechSynthesis.speak(speak);
        }
    }

    // 2. التنقل
    function tab(id, b) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
    }

    // 3. الرسم بالكود
    function render() {
        const canvas = document.getElementById('draw-zone');
        const ctx = canvas.getContext('2d');
        const code = document.getElementById('code-input').value.toLowerCase();
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        if(code === 'circle') {
            ctx.beginPath(); ctx.arc(150, 75, 50, 0, 2*Math.PI); ctx.fill();
        } else if(code === 'square') {
            ctx.fillRect(100, 50, 100, 100);
        } else {
            try { eval(code); } catch(e) { alert("Code Error: Use 'circle', 'square' or JS"); }
        }
    }

    // 4. المصحح (Debugger)
    function debug() {
        const code = document.getElementById('debug-inp').value;
        const stat = document.getElementById('debug-status');
        // فحص منطقي بسيط
        if(!code) { stat.innerText = "Please paste code!"; return; }
        
        if(code.includes(";") || code.includes("function") || code.includes("var")) {
            stat.style.background = "rgba(0,255,136,0.2)";
            stat.style.color = "var(--green)";
            stat.innerText = "✅ Logic Correct: Code syntax is valid. Ready for production.";
        } else {
            stat.style.background = "rgba(255,0,119,0.2)";
            stat.style.color = "var(--pink)";
            stat.innerText = "❌ Syntax Error: Missing tokens or semicolons. Suggestion: Check your brackets!";
        }
    }

    // 5. البوت والباسورد
    function gen() { document.getElementById('p-out').innerText = Math.random().toString(36).slice(-10) + "!" + Math.random().toString(36).toUpperCase().slice(-5); }
    function toggleBot() { let b = document.getElementById('bot-box'); b.style.display = (b.style.display==='flex')?'none':'flex'; }
    
    function talk() {
        const inp = document.getElementById('chat-in');
        const msgs = document.getElementById('messages');
        const val = inp.value.toLowerCase();
        msgs.innerHTML += `<div><b>You:</b> ${inp.value}</div>`;
        
        let res = "Analyzing... How can I assist with your code, Rega?";
        if(val.includes("hi") || val.includes("hello")) res = "System Online. Welcome Boss Rega!";
        if(val.includes("code")) res = "Go to the 'CODE TO ART' tab and type 'circle' to see the magic!";
        if(val.includes("date")) res = "The Rega-Gemini connection began on 4/12/2025.";

        setTimeout(() => { msgs.innerHTML += `<div style="color:var(--cyan)"><b>Bot:</b> ${res}</div>`; msgs.scrollTop=msgs.scrollHeight; }, 300);
        inp.value = "";
    }
</script>
</body>
</html>
