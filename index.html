<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD STUDIO | REGA FINAL EMPIRE</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #020205; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* 🔐 شاشة تسجيل الدخول */
        #login-screen { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-card { background: #0a0a0f; padding: 40px; border: 2px solid var(--cyan); border-radius: 20px; text-align: center; box-shadow: 0 0 30px var(--cyan); }
        .input-style { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 8px; outline: none; }
        .login-btn { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 📱 الهيكل الرئيسي */
        #main-app { display: none; grid-template-columns: 260px 1fr; height: 100vh; }
        .sidebar { background: #05050a; border-right: 2px solid #111; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; cursor: pointer; color: #888; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        /* 📑 الأقسام */
        .content { position: relative; padding: 40px; overflow-y: auto; }
        .section { display: none; }
        .active-sec { display: block !important; }

        /* 🛡️ كارت السيكيورتي والبروفايل */
        .card { background: #0f0f1a; border: 1px solid #222; padding: 30px; border-radius: 20px; text-align: center; max-width: 500px; margin: auto; }
        #pass-box { font-size: 20px; color: var(--green); background: #000; padding: 15px; border-radius: 10px; border: 1px dashed var(--green); margin: 20px 0; }

        /* 🤖 البوت */
        #bot-ui { position: fixed; bottom: 30px; left: 30px; z-index: 500; }
        #bot-bubble { width: 70px; height: 70px; background: var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 30px; }
        #bot-window { position: absolute; bottom: 80px; left: 0; width: 320px; height: 400px; background: #0a0a0f; border: 2px solid var(--cyan); border-radius: 20px; display: none; flex-direction: column; overflow: hidden; }
        #msgs { flex: 1; padding: 15px; overflow-y: auto; font-size: 14px; }
        .chat-input { display: flex; border-top: 1px solid #222; }
        .chat-input input { flex: 1; background: transparent; border: none; color: white; padding: 15px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--cyan)">SYSTEM ACCESS</h2>
        <input type="text" id="user-in" class="input-style" placeholder="Enter Name">
        <input type="password" id="pass-in" class="input-style" placeholder="6-Digit Password">
        <button class="login-btn" onclick="login()">LOGIN</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h2 style="color:var(--cyan)">MD STUDIO</h2>
        <div class="nav-btn active" onclick="showPage('tab1', this)">🧩 SCRATCH</div>
        <div class="nav-btn" onclick="showPage('tab2', this)">🎨 ART DRAW</div>
        <div class="nav-btn" onclick="showPage('tab3', this)">🕹️ GAME MAKER</div>
        <div class="nav-btn" onclick="showPage('tab4', this)">🛡️ SECURITY</div>
        <div class="nav-btn" onclick="showPage('tab5', this)" style="margin-top:auto">👤 PROFILE</div>
    </div>

    <div class="content">
        <div id="tab1" class="section active-sec">
            <h1>Scratch Engine</h1>
            <div id="blocklyDiv" style="height: 70vh; width: 100%; border-radius: 15px; border: 1px solid #222;"></div>
        </div>

        <div id="tab2" class="section">
            <h1>Live Art</h1>
            <button class="nav-btn" style="background:var(--pink); color:white" onclick="draw()">DRAW NOW</button>
            <canvas id="artCanvas" width="500" height="400" style="border:1px solid #222; margin-top:20px;"></canvas>
        </div>

        <div id="tab4" class="section">
            <div class="card">
                <h2 style="color:var(--green)">Server Pass Generator</h2>
                <div id="pass-box">********</div>
                <button class="login-btn" onclick="genStrongPass()">GENERATE SECURE PASS</button>
            </div>
        </div>

        <div id="tab5" class="section">
            <div class="card">
                <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" width="100">
                <h1 id="prof-name" style="color:var(--cyan)">Rega</h1>
                <p>Role: Multidisciplinary Developer</p>
                <p>Member Since: 4/12/2025</p>
                <p>Status: <span style="color:var(--green)">Authorized Admin</span></p>
            </div>
        </div>
    </div>
</div>

<div id="bot-ui">
    <div id="bot-window">
        <div style="background:var(--cyan); color:black; padding:10px; font-weight:bold;">MD BOT</div>
        <div id="msgs"></div>
        <div class="chat-input">
            <input type="text" id="bot-in" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') botReply()">
        </div>
    </div>
    <div id="bot-bubble" onclick="toggleBot()">🤖</div>
</div>

<script>
    // 1. تسجيل الدخول وصوت الترحيب
    function login() {
        const user = document.getElementById('user-in').value;
        const pass = document.getElementById('pass-in').value;
        if(user && pass.length >= 6) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'grid';
            document.getElementById('prof-name').innerText = user;
            
            // صوت الترحيب
            const speech = new SpeechSynthesisUtterance("Welcome " + user + ", System is online");
            window.speechSynthesis.speak(speech);
            
            initBlockly();
        } else {
            alert("Please enter Name and 6-digit Password");
        }
    }

    // 2. نظام التنقل
    function showPage(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-sec'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-sec');
        btn.classList.add('active');
    }

    // 3. الباسورد القوي
    function genStrongPass() {
        const charset = "ABCDEFGHJKLMNOPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz0123456789!@#$%^&*()";
        let p = "";
        for(let i=0; i<20; i++) p += charset.charAt(Math.floor(Math.random()*charset.length));
        document.getElementById('pass-box').innerText = p;
    }

    // 4. البوت الذكي
    function toggleBot() { 
        const win = document.getElementById('bot-window');
        win.style.display = (win.style.display==='flex') ? 'none' : 'flex'; 
    }
    function botReply() {
        const input = document.getElementById('bot-in');
        const msgs = document.getElementById('msgs');
        const text = input.value.toLowerCase();
        msgs.innerHTML += `<div><b>You:</b> ${input.value}</div>`;
        
        let reply = "That's interesting! How can I help with your code?";
        if(text.includes("hello")) reply = "Hello Rega! Ready to build?";
        if(text.includes("pass")) reply = "Check the Security tab for your server password.";
        if(text.includes("date")) reply = "Our relationship started on 4/12/2025!";
        
        setTimeout(() => {
            msgs.innerHTML += `<div style="color:var(--cyan)"><b>Bot:</b> ${reply}</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }, 300);
        input.value = "";
    }

    function initBlockly() {
        Blockly.inject('blocklyDiv', {toolbox: '<xml><block type="controls_if"></block></xml>', theme: Blockly.Themes.Dark});
    }
    
    function draw() {
        const ctx = document.getElementById('artCanvas').getContext('2d');
        ctx.strokeStyle = "cyan"; ctx.strokeRect(50,50,100,100);
    }
</script>
</body>
</html>
