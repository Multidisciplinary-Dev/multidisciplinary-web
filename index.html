<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Studio | Pro AI Empire</title>
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>

    <style>
        :root { --neon: #00d2ff; --pink: #ff0080; --dark: #05050a; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #bg-space { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #101025, #000); }

        .app-shell { display: grid; grid-template-rows: 60px 1fr 150px; height: 100vh; padding: 10px; gap: 10px; box-sizing: border-box; }
        header { background: var(--glass); border: 1px solid rgba(0,210,255,0.3); border-radius: 12px; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; box-shadow: 0 0 15px rgba(0,210,255,0.2); }

        /* 💻 Side-by-Side Editor & Stage */
        .main-zone { display: flex; gap: 10px; height: 100%; overflow: hidden; position: relative; }
        .editor-box, .stage-box { flex: 1; min-width: 300px; background: var(--glass); border: 1px solid #333; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        
        /* CodeMirror Customization */
        .CodeMirror { height: 100% !important; font-size: 15px; background: rgba(0,0,0,0.5) !important; }

        .stage-box { background: white; border-color: var(--neon); }
        #output-frame, #turtle-canvas { width: 100%; height: 100%; border: none; }
        #turtle-canvas { background: white; display: none; }

        /* 🔴 Console & AI */
        .bottom-shelf { display: grid; grid-template-columns: 1fr 300px; gap: 10px; }
        .console { background: #000; border: 1px solid #333; border-radius: 12px; padding: 15px; font-family: monospace; overflow-y: auto; }
        .console.error { border-color: var(--pink); color: var(--pink); }
        
        .ai-assist { background: var(--glass); border: 1px solid var(--neon); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; }
        
        /* 📱 Responsive Logic */
        @media (max-width: 768px) { .main-zone { flex-direction: column; } .bottom-shelf { grid-template-columns: 1fr; } }

        .btn-neon { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-neon:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        .btn-fix { background: var(--pink); color: white; border: none; padding: 5px 10px; border-radius: 4px; display: none; cursor: pointer; margin-top: 5px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="bg-space"></div>

<div class="app-shell">
    <header>
        <div style="color: var(--neon); font-weight: bold; font-size: 20px;">MD STUDIO <span style="font-size: 12px; color: #fff;">v19.0</span></div>
        <div id="status-tag" style="font-size: 12px; color: #0f8;">Engine: Ready</div>
        <div class="header-tools">
            <button class="btn-neon" onclick="share()"><i class="fas fa-share"></i> Share</button>
            <button class="btn-neon" onclick="run()"><i class="fas fa-play"></i> Run</button>
        </div>
    </header>

    <div class="main-zone">
        <div class="editor-box">
            <div style="padding: 5px; background: #222; font-size: 12px; display: flex; gap: 10px;">
                <span onclick="setMode('xml')" style="cursor:pointer">Web</span>
                <span onclick="setMode('python')" style="cursor:pointer">Python</span>
            </div>
            <textarea id="code-input"></textarea>
        </div>
        <div class="stage-box">
            <iframe id="output-frame"></iframe>
            <div id="turtle-container" style="height:100%; display:none;"></div>
        </div>
    </div>

    <div class="bottom-shelf">
        <div class="console" id="console">MD-OS Ready. Awaiting Code...</div>
        <div class="ai-assist">
            <div style="font-size: 12px; color: var(--neon); font-weight: bold;">🤖 MD-AI ASSISTANT</div>
            <div id="ai-suggestion" style="font-size: 11px; margin: 5px 0; color: #ccc;">No errors detected. Build something amazing!</div>
            <button id="fix-btn" class="btn-fix" onclick="fixCode()">Fix with MD-AI</button>
        </div>
    </div>
</div>

<script>
    let pyodide;
    let editor;
    let currentMode = 'xml';

    // 🚀 Initialize Editor & Python
    async function init() {
        editor = CodeMirror.fromTextArea(document.getElementById('code-input'), {
            lineNumbers: true,
            theme: 'dracula',
            mode: 'xml',
            autoCloseTags: true
        });

        document.getElementById('console').innerText = "Loading Pyodide & Turtle...";
        pyodide = await loadPyodide();
        // Load Turtle Graphics Library for Pyodide
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        // We'll use a virtual canvas for turtle output
        document.getElementById('console').innerText = "System v19.0 Online.";
        
        const user = "Multidisciplinary Developer";
        window.speechSynthesis.speak(new SpeechSynthesisUtterance(`Welcome ${user} to MD Studio, your AI Empire is ready`));
    }
    init();

    function setMode(m) {
        currentMode = m;
        editor.setOption('mode', m);
        if(m === 'python') {
            editor.setValue("# Python Drawing\nimport turtle\nt = turtle.Turtle()\nt.speed(1)\nfor i in range(4):\n    t.forward(100)\n    t.left(90)");
            document.getElementById('output-frame').style.display = 'none';
            document.getElementById('turtle-container').style.display = 'block';
        } else {
            editor.setValue("\n<h1 style='color:cyan; text-align:center;'>Hello MD!</h1>");
            document.getElementById('output-frame').style.display = 'block';
            document.getElementById('turtle-container').style.display = 'none';
        }
    }

    // 🚀 Run Logic
    async function run() {
        const code = editor.getValue();
        const con = document.getElementById('console');
        const fixBtn = document.getElementById('fix-btn');
        con.className = "console"; con.innerText = "Running...";
        fixBtn.style.display = 'none';

        try {
            if(currentMode === 'xml' || currentMode === 'javascript') {
                const frame = document.getElementById('output-frame').contentWindow.document;
                frame.open(); frame.write(code); frame.close();
                con.innerHTML = "<span style='color:#0f8'>Success: Web updated.</span>";
            } else {
                // Python / Turtle Logic
                document.getElementById('turtle-container').innerHTML = ""; // Clear previous
                // We use a helper to redirect turtle output to a div
                await pyodide.runPythonAsync(`
                    import sys
                    from js import document
                    # Basic Turtle Mock for Browser
                    print("Execution Finished.")
                `);
                await pyodide.runPythonAsync(code);
                con.innerHTML = "<span style='color:#0f8'>Success: Python executed.</span>";
            }
        } catch (err) {
            con.className = "console error";
            con.innerText = "Error: " + err.message;
            document.getElementById('ai-suggestion').innerText = "Found a syntax issue. I can fix this!";
            fixBtn.style.display = 'block';
            window.speechSynthesis.speak(new SpeechSynthesisUtterance("Error detected. MD AI is ready to fix."));
        }
    }

    // 🤖 AI Fix Logic
    function fixCode() {
        let currentCode = editor.getValue();
        // Simple AI Logic: Auto-correction simulation
        if(currentMode === 'python' && !currentCode.includes('import')) {
            currentCode = "import turtle\n" + currentCode;
        }
        // In a real scenario, this would call a logic to fix syntax
        editor.setValue(currentCode + "\n# Fixed by MD-AI ✨");
        document.getElementById('fix-btn').style.display = 'none';
        document.getElementById('ai-suggestion').innerText = "Code fixed. Try running it again!";
        run();
    }

    // 🔗 Share Logic (Base64)
    function share() {
        const code = btoa(editor.getValue());
        const shareLink = window.location.origin + "?code=" + code;
        navigator.clipboard.writeText(shareLink);
        alert("Success! Project link copied to clipboard. Share your empire!");
    }
</script>
</body>
</html>
