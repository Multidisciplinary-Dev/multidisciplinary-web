<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MD Studio | Project Cloud v9</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>

    <style>
        :root { --accent: #00d2ff; --pink: #ff0080; --dark: #050510; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Layout */
        #main-app { display: flex; flex-direction: column; height: 100vh; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 200px; background: #0a0a15; border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { padding: 10px; cursor: pointer; border-radius: 8px; background: #111; font-size: 13px; border: 1px solid #333; }
        .nav-link.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Workspace */
        .view { flex: 1; display: none; padding: 20px; }
        .view.active { display: block; }
        
        /* Project Manager Panel */
        .project-panel { width: 200px; background: #000; border-left: 1px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .prj-item { padding: 8px; background: #111; border-radius: 5px; cursor: pointer; font-size: 12px; border: 1px solid #222; overflow: hidden; text-overflow: ellipsis; }
        .prj-item:hover { border-color: var(--accent); }

        .btn-save { background: var(--pink); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="main-app">
    <nav style="height:50px; background:#000; border-bottom:1px solid var(--accent); display:flex; align-items:center; padding:0 20px; justify-content:space-between;">
        <span style="color:var(--accent); font-weight:bold;">MD STUDIO CLOUD</span>
        <span id="user-display">Developer</span>
    </nav>

    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-link active" onclick="showTab('v-web')">🌐 Web Workspace</div>
            <div class="nav-link" onclick="showTab('v-game')">🎮 Game Studio</div>
            <button onclick="location.reload()" style="margin-top:auto;">Logout</button>
        </div>

        <div id="v-web" class="view active" style="display:flex; gap:10px; padding:0;">
            <div style="flex:1; display:flex; flex-direction:column; padding:15px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <h3>Code Editor</h3>
                    <input type="text" id="project-name" placeholder="Project Name..." style="background:#111; color:white; border:1px solid #444; padding:5px; border-radius:5px;">
                    <button class="btn-save" onclick="saveProject()">💾 SAVE PROJECT</button>
                </div>
                <textarea id="editor"></textarea>
            </div>
            
            <div class="project-panel">
                <h4 style="font-size:12px; color:var(--accent);">MY PROJECTS</h4>
                <div id="projects-list"></div>
            </div>
        </div>

        <div id="v-game" class="view">
            <h3>Touch Game Engine</h3>
            <p>Your game progress is saved locally.</p>
            </div>
    </div>
</div>

<script>
    // Initialize Editor
    const editor = CodeMirror.fromTextArea(document.getElementById('editor'), {
        mode: "xml",
        theme: "dracula",
        lineNumbers: true
    });

    let currentUserId = "dev_user"; // User identification

    // 💾 وظيفة حفظ المشروع
    function saveProject() {
        const name = document.getElementById('project-name').value;
        const code = editor.getValue();
        
        if (!name) { alert("Please enter a project name!"); return; }

        // الحصول على المشاريع القديمة أو إنشاء قائمة جديدة
        let projects = JSON.parse(localStorage.getItem('md_projects_' + currentUserId)) || {};
        projects[name] = { code: code, date: new Date().toLocaleString() };
        
        localStorage.setItem('md_projects_' + currentUserId, JSON.stringify(projects));
        alert("Project '" + name + "' saved successfully!");
        loadProjectsList();
    }

    // 📂 تحميل قائمة المشاريع
    function loadProjectsList() {
        const listDiv = document.getElementById('projects-list');
        const projects = JSON.parse(localStorage.getItem('md_projects_' + currentUserId)) || {};
        listDiv.innerHTML = "";

        for (let name in projects) {
            const item = document.createElement('div');
            item.className = "prj-item";
            item.innerHTML = `<strong>${name}</strong><br><small style="color:#666">${projects[name].date}</small>`;
            item.onclick = () => {
                editor.setValue(projects[name].code);
                document.getElementById('project-name').value = name;
            };
            listDiv.appendChild(item);
        }
    }

    function showTab(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Load projects on start
    window.onload = loadProjectsList;
</script>
</body>
</html>
