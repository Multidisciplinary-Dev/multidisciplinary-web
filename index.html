<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retaj Studio | MD Ultimate</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0077; --green: #00ff88; --dark: #05050a; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* 🔐 شاشة الدخول */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0a0a15; padding: 40px; border: 2px solid var(--cyan); border-radius: 20px; text-align: center; width: 320px; box-shadow: 0 0 30px var(--cyan); }
        .input-style { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--cyan); border-radius: 8px; outline: none; box-sizing: border-box; }

        /* 📱 الواجهة */
        #main-app { display: none; height: 100vh; grid-template-columns: 260px 1fr; }
        @media (max-width: 768px) { #main-app { grid-template-columns: 1fr; } .sidebar { display: none; } }
        
        .sidebar { background: #080810; border-right: 2px solid #1a1a25; padding: 25px; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { padding: 15px; background: #111; border: 1px solid #222; border-radius: 12px; cursor: pointer; color: #777; font-weight: bold; transition: 0.3s; text-align: center; }
        .nav-link.active { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        .content-view { flex: 1; padding: 30px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }

        /* 🎨 Art Lab المربعين */
        .art-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        canvas { background: white; border-radius: 15px; width: 100%; height: 300px; }

        /* 🛡️ AI Debugger */
        #dbg-status { margin-top: 15px; padding: 15px; background: #0a0a15; border-radius: 12px; border: 1px dashed var(--cyan); white-space: pre-wrap; font-size: 14px; }

        /* 👤 Profile Security */
        .security-box { background: #111; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid var(--pink); text-align: left; font-family: monospace; }
        
        .made-by { position: fixed; bottom: 15px; right: 20px; color: var(--cyan); font-weight: bold; font-size: 14px; }

        /* 🤖 البوت */
        #bot-window { position: fixed; bottom: 80px; left: 20px; width: 280px; height: 350px; background: #0a0a0f; border: 2px solid var(--cyan); border-radius: 20px; display: none; flex-direction: column; overflow: hidden; z-index: 1000; }
        #chat-logs { flex: 1; padding: 15px; overflow-y: auto; background: #05050a; font-size: 14px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--cyan)">MADE WITH RETAJ</h2>
        <input type="text" id="user-input" class="input-style" placeholder="Admin
