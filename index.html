    <style>
        :root { --accent: #00d2ff; --pink: #ff0080; --bg: #050510; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* 🌌 Space & Symbols Background */
        canvas#space-bg { position: fixed; top: 0; left: 0; z-index: -1; }

        /* 🚪 Flexible Auth Overlay */
        #auth-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .auth-card { background: rgba(20,20,40,0.8); padding: 40px; border-radius: 20px; border: 1px solid var(--accent); width: 350px; text-align: center; }
        .input-field { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }

        /* 📱 Main UI Layout */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        nav { background: #000; height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); }
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 250px; background: rgba(0,0,0,0.5); border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: black; font-weight: bold; }

        /* Viewports */
        .viewport { flex: 1; display: none; padding: 20px; overflow-y: auto; position: relative; }
        .viewport.active { display: block; }

        /* Editors */
        .editor-container { display: flex; flex-direction: column; height: 85%; gap: 10px; }
        .cm-wrap { flex: 1; border: 1px solid #333; overflow: hidden; }
        .CodeMirror { height: 100% !important; }
        #console { background: #000; color: #0f0; padding: 10px; height: 150px; overflow-y: auto; font-family: monospace; border: 1px solid #333; }

        /* Marketplace & Profile */
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; }
        .btn-buy { background: var(--pink); border: none; color: white; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; }

        /* Game Stage */
        #game-canvas { background: white; width: 100%; height: 500px; border-radius: 15px; position: relative; overflow: hidden; }
        .sprite { position: absolute; width: 60px; cursor: move; touch-action: none; }
        
        .avatar-circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
    </style>
</head>

<canvas id="space-bg"></canvas>

<div id="auth-screen">

        <h2 style="color:var(--accent)">MD STUDIO EMPIRE</h2>
        <input type="text" id="user-name" class="input-field" placeholder="Full Name or Username">
        <input type="text" id="user-contact" class="input-field" placeholder="Email, Phone or FB Link">
        <div style="margin: 10px 0;">
            <label style="font-size:11px; color:#888;">Profile Picture (Optional)</label>
            <input type="file" id="user-img-input" style="display:none" onchange="previewAvatar(event)">
            <button onclick="document.getElementById('user-img-input').click()" class="input-field" style="background:#222; cursor:pointer">Upload Image</button>
        </div>
        <button onclick="enterApp()" style="width:100%; padding:15px; background:linear-gradient(45deg, var(--accent), var(--pink)); border:none; color:white; font-weight:bold; border-radius:8px; cursor:pointer;">LAUNCH ENGINE</button>
    </div>
</div>
