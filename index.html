<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>MD STUDIO | SUPREME EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Source+Code+Pro&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { --cyan: #00f2ff; --pink: #ff007f; --dark: #020205; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: manipulation; }

        /* شاشة الدخول الاحترافية */
        #login-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: black; gap: 20px; }
        .matrix-box { width: 350px; height: 400px; background: #000; border: 1px solid #111; border-radius: 15px; padding: 15px; overflow: hidden; font-family: 'Source Code Pro'; color: #0f8; font-size: 11px; }
        .login-card { width: 320px; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; backdrop-filter: blur(10px); }
        
        .input-style { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--cyan); border-radius: 5px; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-log { width: 100%; padding: 15px; background: #222; color: #555; border: none; border-radius: 5px; font-weight: bold; cursor: not-allowed; transition: 0.4s; }
        .btn-log.ready { background: #00ff88; color: black; cursor: pointer; box-shadow: 0 0 20px #00ff88; }

        /* الواجهة الرئيسية */
        #main-app { display: none; grid-template-columns: 240px 1fr; height: 100vh; position: relative; z-index: 10; }
        .sidebar { background: rgba(0,0,0,0.9); border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; border-radius: 8px; border: 1px solid #333; color: #ccc; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { background: var(--cyan); color: black; }

        /* المربع الذكي مع زرار المسافة */
        .editor-container { position: relative; margin-top: 15px; }
        .smart-editor { width: 100%; min-height: 60px; background: #000; border: 2px solid var(--pink); border-radius: 10px; padding: 15px; color: #0f8; font-family: 'Source Code Pro'; resize: both; overflow: auto; box-sizing: border-box; }
        .space-btn { position: absolute; top: 5px; right: 5px; background: #222; color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* بوت الـ AI */
        #ai-bot { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; cursor: pointer; z-index: 1000; box-shadow: 0 0 15px var(--cyan); color: black; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="matrix-box" id="matrix-code"></div>
    <div class="login-card">
        <h2 style="color:var(--cyan); font-size: 18px;">JOIN MD STUDIO</h2>
        <input type="text" id="u-name" class="input-style" placeholder="Your Name">
        <input type="password" id="u-pass" class="input-style" placeholder="Password (6 Chars)">
        <p id="hint" style="color:var(--pink); font-size: 10px; display:none;">6 Mixed Chars Required!</p>
        <button id="entry-btn" onclick="login()" class="btn-log">LAUNCH ENGINE</button>
    </div>
</div>

<div id="main-app">
    <div class="sidebar">
        <h2 style="color:var(--cyan); font-size: 14px;">MD STUDIO</h2>
        <div class="nav-btn active">GAME BUILDER</div>
        <div class="nav-btn">AI LAB</div>
        <div class="nav-btn" style="margin-top:auto; background:var(--pink); color:white;" onclick="logout()">LOGOUT</div>
    </div>
    
    <div style="padding: 25px;">
        <h1 id="welcome-msg" style="color:var(--cyan); text-shadow: 0 0 10px var(--cyan);"></h1>
        
        <div class="editor-container">
            <div class="space-btn" onclick="addSpace('main-editor')">TAB SPACE</div>
            <div class="smart-editor" id="main-editor" contenteditable="true" oninput="autoExpand(this)">
                // Write your empire code here...
            </div>
        </div>
    </div>
</div>

<div id="ai-bot"><i class="fas fa-robot"></i></div>

<script>
    // 1. نظام الذاكرة والترحيب
    window.onload = function() {
        const savedName = localStorage.getItem('md_user');
        if(savedName) {
            showApp(savedName, true);
        }
        startMatrix();
    };

    function login() {
        if(!document.getElementById('entry-btn').classList.contains('ready')) return;
        const name = document.getElementById('u-name').value;
        localStorage.setItem('md_user', name);
        showApp(name, false);
    }

    function showApp(name, isOld) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        
        const msg = isOld ? `WELCOME BACK, ${name.toUpperCase()}!` : `WELCOME, ${name.toUpperCase()}!`;
        document.getElementById('welcome-msg').innerText = msg;
        
        // ترحيب صوتي
        const synth = window.speechSynthesis;
        synth.speak(new SpeechSynthesisUtterance(msg));
    }

    // 2. التحقق من الباسورد (6 خانات ميكس)
    document.getElementById('u-pass').addEventListener('input', function() {
        const v = this.value;
        const btn = document.getElementById('entry-btn');
        const valid = v.length === 6 && /[a-zA-Z]/.test(v) && /[0-9]/.test(v);
        
        if(v.length > 0 && !valid) {
            document.getElementById('hint').style.display = 'block';
            btn.classList.remove('ready');
        } else if(valid) {
            document.getElementById('hint').style.display = 'none';
            btn.classList.add('ready');
        }
    });

    // 3. علامة المساحة للأكواد
    function addSpace(id) {
        const editor = document.getElementById(id);
        editor.focus();
        document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;');
    }

    // 4. المربع الذكي
    function autoExpand(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // تأثير الماتريكس (الأكواد العشوائية)
    function startMatrix() {
        const codes = ["import md_empire", "system.status = 'Ready'", "turtle.draw_neon()", "ai.connect()", "fixing_bug_04...", "sketchpy.render()"];
        const box = document.getElementById('matrix-code');
        setInterval(() => {
            const line = codes[Math.floor(Math.random()*codes.length)];
            box.innerHTML += `<div>> ${line}</div>`;
            if(box.children.length > 15) box.removeChild(box.firstChild);
        }, 600);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
