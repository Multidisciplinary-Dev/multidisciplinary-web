<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD EMPIRE | Ultimate IDE</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
    <style>
        :root { --accent: #00d2ff; --err: #ff4d4d; --dark: #05050a; --panel: #111; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Consolas', monospace; overflow: hidden; }
        canvas#matrix { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }

        /* 🔐 Login Gate */
        #gate { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; z-index: 999; position: relative; }
        .gate-card { background: #111; padding: 40px; border: 2px solid var(--accent); border-radius: 20px; width: 330px; text-align: center; box-shadow: 0 0 20px var(--accent); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--accent); border-radius: 8px; outline: none; box-sizing: border-box; }

        /* 📱 Main Layout */
        #main-app { display: none; height: 100vh; grid-template-columns: 220px 1fr 300px; grid-template-rows: 50px 1fr; }
        header { grid-column: 1 / -1; background: #000; border-bottom: 2px solid var(--accent); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; }
        
        /* 🚥 Sidebar */
        .sidebar { background: var(--panel); border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn { padding: 12px; cursor: pointer; border-radius: 8px; border: 1px solid #333; text-align: center; font-size: 13px; transition: 0.3s; color: #fff; background: transparent; }
        .nav-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        /* 💻 Workspace */
        .workspace { display: grid; grid-template-rows: 1fr 180px; padding: 15px; gap: 15px; overflow: hidden; }
        .editor-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 100%; }
        #code-editor { background: #0a0a0a; color: #0f8; padding: 15px; border-radius: 10px; border: 1px solid #333; resize: none; font-size: 14px; line-height: 1.5; }
        .stage { background: white; border-radius: 10px; overflow: hidden; position: relative; border: 3px solid #333; }
        
        /* 🔴 Console (Black & Red) */
        .console { background: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; color: #aaa; overflow-y: auto; font-size: 13px; font-family: 'Courier New', monospace; }
        .console.error { border-color: var(--err); color: var(--err); background: rgba(50, 0, 0, 0.3); }
        .console.success { border-color: #0f8; color: #0f8; }

        /* 🤖 AI Sidebar */
        .ai-sidebar { background: #000; border-left: 2px solid var(--accent); display: flex; flex-direction: column; padding: 15px; }
        .chat-area { flex: 1; overflow-y: auto; font-size: 13px; margin-bottom: 15px; }
        .ai-bubble { background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); color: var(--accent); line-height: 1.4; }

        /* 👤 Profile Page */
        #profile-page { display: none; position: fixed; inset: 0; background: var(--dark); z-index: 1000; padding: 50px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="gate">
    <div class="gate-card">
        <h2 style="color:var(--accent)">MD EMPIRE LOGIN</h2>
        <input type="text" id="user-n" placeholder="Username">
        <input type="password" id="user-p" placeholder="Password (6 characters)" oninput="vGate()">
        <div id="gate-msg" style="color:var(--err); font-size:12px; margin-bottom:10px; font-weight:bold;"></div>
        <button id="gate-btn" onclick="enterApp()" disabled style="width:100%; padding:15px; background:#222; border:none; border-radius:10px; color:#555; font-weight:bold;">LAUNCH ENGINE</button>
    </div>
</div>

<div id="profile-page">
    <div style="max-width:500px; margin:auto; background:#111; padding:30px; border:2px solid var(--accent); border-radius:20px; text-align:center;">
        <h2 style="color:var(--accent)">ACCOUNT SETTINGS</h2>
        <img id="p-avatar" src="https://via.placeholder.com/100" style="border-radius:50%; border:2px solid var(--accent); margin-bottom:15px; width:100px; height:100px; object-fit:cover;">
        <input type="text" id="set-name" placeholder="Change Name">
        <textarea id="set-bio" placeholder="Change Bio (e.g. Multidisciplinary Developer)"></textarea>
        <button class="nav-btn" onclick="saveP()" style="background:var(--accent); color:black; width:100%; margin-top:10px; border:none; font-weight:bold;">SAVE & RETURN</button>
        <button class="nav-btn" onclick="closeProfile()" style="width:100%; margin-top:10px; border:1px solid #444;">CANCEL</button>
    </div>
</div>

<div id="main-app">
    <header>
        <div style="color:var(--accent); font-weight:bold;">MD-OS v17.0 | <span id="mode-text">Python Mode</span></div>
        <div id="user-tag" style="color:#0f8;">Admin: Multidisciplinary Developer</div>
    </header>

    <div class="sidebar">
        <div class="nav-btn active" id="p-btn" onclick="setMode('py')">🐍 Python Hub</div>
        <div class="nav-btn" id="w-btn" onclick="setMode('web')">🌐 Web Hub</div>
        <div class="nav-btn" onclick="openProfile()">👤 My Profile</div>
        <button onclick="location.reload()" style="margin-top:auto; background:var(--err); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">Logout</button>
    </div>

    <div class="workspace">
        <div class="editor-split">
            <textarea id="code-editor" spellcheck="false"># Python Mode Ready
print("Hello MD!")</textarea>
            <div class="stage">
                <div id="py-out" style="padding:20px; color:#333; font-size:16px; white-space:pre-wrap;"></div>
                <iframe id="web-out" style="width:100%; height:100%; border:none; display:none; background:white;"></iframe>
            </div>
        </div>
        <div class="console" id="console-log">Console Ready...</div>
        <button onclick="run()" style="background:#0f8; color:#000; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px;">▶ EXECUTE CODE</button>
    </div>

    <div class="ai-sidebar">
        <h4 style="color:var(--accent); margin-top:0;">🤖 MD-AI ASSISTANT</h4>
        <div class="chat-area" id="chat">
            <div class="ai-bubble">System Active. How can I help you code today?</div>
        </div>
        <input type="text" id="ai-input" placeholder="Ask AI..." onkeydown="if(event.key==='Enter') aiChat()">
        <button onclick="aiChat()" style="background:var(--accent); border:none; padding:10px; border-radius:8px; font-weight:bold; cursor:pointer;">SEND</button>
    </div>
</div>

<script>
    let pyInstance;
    let currentMode = 'py';

    // 🔐 Gate Validation (Exactly 6 chars)
    function vGate() {
        const p = document.getElementById('user-p').value;
        const b = document.getElementById('gate-btn');
        const msg = document.getElementById('gate-msg');
        
        if (p.length === 6) {
            msg.innerHTML = "<span style='color:#0f8'>✅ Pass Accepted</span>";
            b.disabled = false; b.style.background = "var(--accent)"; b.style.color="#000"; b.style.cursor="pointer";
        } else {
            msg.innerText = "❌ Password must be 6 characters!";
            b.disabled = true; b.style.background = "#222"; b.style.color="#555";
        }
    }

    async function enterApp() {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('main-app').style.display = 'grid';
        document.getElementById('console-log').innerText = "Loading Python Engine...";
        pyInstance = await loadPyodide();
        document.getElementById('console-log').innerText = "System Online. Python/Web Ready.";
        speakAI("Welcome back. Your empire is ready.");
    }

    // 🔄 Switch Modes
    function setMode(m) {
        currentMode = m;
        document.getElementById('p-btn').className = m === 'py' ? 'nav-btn active' : 'nav-btn';
        document.getElementById('w-btn').className = m === 'web' ? 'nav-btn active' : 'nav-btn';
        document.getElementById('mode-text').innerText = m === 'py' ? 'Python Mode' : 'Web Mode';
        document.getElementById('py-out').style.display = m === 'py' ? 'block' : 'none';
        document.getElementById('web-out').style.display = m === 'web' ? 'block' : 'none';
        document.getElementById('code-editor').value = m === 'py' ? '# Python Code\nprint("Hello!")' : '\n<h1 style="color:blue">Hello Web!</h1>';
    }

    // 🚀 EXECUTION ENGINE (The Fixed Part)
    async function run() {
        const code = document.getElementById('code-editor').value;
        const con = document.getElementById('console-log');
        con.className = 'console'; con.innerText = "Processing...";

        try {
            if (currentMode === 'py') {
                pyInstance.runPython(`import sys\nfrom io import StringIO\nsys.stdout = StringIO()`);
                await pyInstance.runPythonAsync(code);
                document.getElementById('py-out').innerText = pyInstance.runPython("sys.stdout.getvalue()");
            } else {
                const ifr = document.getElementById('web-out').contentWindow.document;
                const fullHTML = `<!DOCTYPE html><html><body>${code}</body></html>`;
                ifr.open(); ifr.write(fullHTML); ifr.close();
            }
            con.innerText = "Success: Execution Finished. ✅";
            con.classList.add('success');
        } catch (e) {
            con.innerText = "❌ Error Detected: " + e.message;
            con.classList.add('error');
            speakAI("Error in code. Check the console.");
            aiHelp(e.message);
        }
    }

    // 🤖 AI Interaction
    function aiChat() {
        const inp = document.getElementById('ai-input');
        const chat = document.getElementById('chat');
        if(!inp.value) return;
        chat.innerHTML += `<div style="text-align:right; margin-bottom:10px;">${inp.value}</div>`;
        const q = inp.value.toLowerCase();
        inp.value = "";
        setTimeout(() => {
            let res = "I'm monitoring the stage. Your code looks interesting!";
            if(q.includes("fix")) res = "Let's analyze the syntax. Check if you closed all tags correctly.";
            chat.innerHTML += `<div class="ai-bubble">${res}</div>`;
            speakAI(res);
            chat.scrollTop = chat.scrollHeight;
        }, 600);
    }

    function aiHelp(err) {
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="ai-bubble" style="border-color:red">💡 AI FIX: I detected a ${err.split(':')[0]}. Try checking your syntax or indentation!</div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function speakAI(t) {
        const s = new SpeechSynthesisUtterance(t);
        s.lang = 'en-US'; window.speechSynthesis.speak(s);
    }

    // 👤 Profile Actions
    function openProfile() { document.getElementById('profile-page').style.display = 'block'; }
    function closeProfile() { document.getElementById('profile-page').style.display = 'none'; }
    function saveP() { 
        const newName = document.getElementById('set-name').value;
        if(newName) document.getElementById('user-tag').innerText = "Admin: " + newName;
        closeProfile(); 
    }

    // 🌌 Background Matrix
    const cv = document.getElementById('matrix'), ct = cv.getContext('2d');
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    const dr = Array(100).fill(1);
    function draw() {
        ct.fillStyle = "rgba(0,0,0,0.1)"; ct.fillRect(0,0,cv.width,cv.height);
        ct.fillStyle = "#00d2ff"; dr.forEach((y, i) => {
            ct.fillText(Math.random() > 0.5 ? "1" : "0", i*20, y*20);
            if(y*20 > cv.height) dr[i]=0; dr[i]++;
        });
    } setInterval(draw, 50);
</script>
</body>
</html>
