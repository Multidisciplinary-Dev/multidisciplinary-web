<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD Studio | The Multi-Dev Empire</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/xml/xml.min.js"></script>

    <style>
        :root { --accent: #00d2ff; --pink: #ff0080; --dark: #050510; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* 🚪 Auth Screen */
        #auth-screen { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center; background: #000; }
        .auth-container { display: flex; gap: 40px; align-items: center; width: 90%; max-width: 1000px; z-index: 10; }
        
        .matrix-box { background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--accent); width: 450px; height: 350px; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }

        .auth-card { background: rgba(20, 20, 40, 0.95); padding: 35px; border-radius: 25px; width: 380px; border: 1px solid #333; text-align: center; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 14px; background: linear-gradient(45deg, var(--accent), var(--pink)); border: none; color: white; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }

        /* 📱 Main Layout */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        nav { height: 60px; background: #000; border-bottom: 2px solid var(--accent); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 230px; background: rgba(0,0,0,0.5); border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { padding: 12px; cursor: pointer; border-radius: 10px; font-size: 14px; }
        .nav-link.active { background: var(--accent); color: #000; font-weight: bold; }

        .view { flex: 1; display: none; padding: 25px; overflow-y: auto; }
        .view.active { display: block; }
        #game-stage { background: white; width: 100%; height: 400px; border-radius: 15px; position: relative; overflow: hidden; }
        .sprite { position: absolute; cursor: move; font-size: 40px; touch-action: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-container">
        <div class="matrix-box">
            <canvas id="m-canvas"></canvas>
            <div style="position:relative; z-index:5; color:var(--accent); font-family:monospace;">SYSTEM_READY...</div>
        </div>

        <div class="auth-card">
            <h2 id="auth-title" style="color:var(--accent);">Join MD Studio</h2>
            <div id="auth-form">
                <input type="text" id="reg-name" class="input-field" placeholder="Full Name">
                <input type="text" id="reg-id" class="input-field" placeholder="Username">
                <input type="password" id="reg-pass" class="input-field" placeholder="Password (6 chars: A-z + 0-9)">
            </div>
            <button onclick="handleAuth()" class="btn-main" id="main-btn">LAUNCH ENGINE</button>
            <p style="font-size:12px; margin-top:15px; color:#888;">
                <span id="toggle-text">Already a developer?</span> 
                <span onclick="toggleAuth()" style="color:var(--accent); cursor:pointer; font-weight:bold;">Click here</span>
            </p>
        </div>
    </div>
</div>

<div id="main-app">
    <nav>
        <div style="font-weight:900; color:var(--accent);">MD STUDIO v6.0</div>
        <div id="nav-user">Developer</div>
    </nav>
    <div class="main-layout">
        <div class="sidebar">
            <div class="nav-link active" onclick="showView('v-web')">🌐 Web Workspace</div>
            <div class="nav-link" onclick="showView('v-game')">🎮 Game Studio</div>
            <div class="nav-link" onclick="showView('v-ai')">🤖 AI Expert</div>
            <div class="nav-link" onclick="showView('v-market')">🛒 Marketplace</div>
            <button onclick="location.reload()" style="margin-top:auto;">Logout</button>
        </div>

        <div id="v-web" class="view active">
            <h3>Web Editor</h3>
            <textarea id="web-editor"></textarea>
        </div>

        <div id="v-game" class="view">
            <h3>Game Engine (Touch)</h3>
            <button onclick="spawnEmoji('🚀')">Add Ship</button>
            <div id="game-stage" style="margin-top:10px;"></div>
        </div>

        <div id="v-ai" class="view">
            <h3>AI Specialist (Web Only)</h3>
            <div id="ai-chat" style="height:200px; background:#000; padding:10px; margin-bottom:10px;">AI: Ask me about HTML/CSS/JS.</div>
            <input type="text" id="ai-in" class="input-field" placeholder="Ask...">
            <button onclick="askAI()" class="btn-main">Ask AI</button>
        </div>

        <div id="v-market" class="view">
            <h3>Marketplace</h3>
            <div style="border:1px solid #333; padding:10px;">Premium Script - $25 <button>Buy</button></div>
        </div>
    </div>
</div>

<script>
    // --- 🖋️ Matrix Effect ---
    const canvas = document.getElementById('m-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 450; canvas.height = 350;
    const chars = "0101MDSTUDIO";
    const drops = Array(30).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0,0,0,0.05)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00d2ff";
        drops.forEach((y, i) => {
            ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*15, y*15);
            if(y*15 > canvas.height && Math.random() > 0.975) drops[i]=0;
            drops[i]++;
        });
    } setInterval(drawMatrix, 50);

    // --- 🔐 Professional Auth (Your Rules) ---
    let isLogin = false;
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Login" : "Join MD Studio";
        document.getElementById('reg-name').style.display = isLogin ? 'none' : 'block';
    }

    function handleAuth() {
        const id = document.getElementById('reg-id').value;
        const pass = document.getElementById('reg-pass').value;
        
        // 🛡️ SECURITY CHECK
        if (pass.length !== 6) { alert("Error: Exactly 6 characters required!"); return; }
        if (!/[a-zA-Z]/.test(pass) || !/[0-9]/.test(pass)) { alert("Error: Must include Letters & Numbers!"); return; }

        if (isLogin) {
            const saved = localStorage.getItem('u_'+id);
            if (saved && JSON.parse(saved).pass === pass) launch(JSON.parse(saved).name);
            else alert("Invalid Login!");
        } else {
            const name = document.getElementById('reg-name').value;
            localStorage.setItem('u_'+id, JSON.stringify({name, pass}));
            alert("Account Created!"); toggleAuth();
        }
    }

    function launch(name) {
        document.getElementById('auth-screen').style.display='none';
        document.getElementById('main-app').style.display='flex';
        document.getElementById('nav-user').innerText = name;
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function askAI() {
        const q = document.getElementById('ai-in').value.toLowerCase();
        const chat = document.getElementById('ai-chat');
        const keys = ['html','css','js'];
        chat.innerHTML += `<div>You: ${q}</div>`;
        if(keys.some(k => q.includes(k))) chat.innerHTML += `<div>AI: That's a web dev question!</div>`;
        else chat.innerHTML += `<div style="color:red">AI: I only answer Web questions!</div>`;
    }

    function spawnEmoji(e) {
        const d = document.createElement('div');
        d.className = 'sprite'; d.innerText = e;
        d.style.left = '50px'; d.style.top = '50px';
        let m = false;
        d.onmousedown = d.ontouchstart = () => m = true;
        window.onmouseup = window.ontouchend = () => m = false;
        window.onmousemove = window.ontouchmove = (ev) => {
            if(m) {
                let x = ev.type.includes('touch') ? ev.touches[0].clientX : ev.clientX;
                d.style.left = (x-300)+'px';
            }
        };
        document.getElementById('game-stage').appendChild(d);
    }

    CodeMirror.fromTextArea(document.getElementById('web-editor'), { mode: "xml", theme: "dracula", lineNumbers: true });
</script>
</body>
</html>
