<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multidisciplinary Dev Hub | Scratch & Game Studio</title>
    <style>
        body { background-color: #0a0a1a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        nav { background: #1a1a2e; padding: 20px; border-bottom: 3px solid #e94560; font-size: 26px; font-weight: bold; color: #e94560; }
        .container { margin: 20px auto; padding: 20px; border: 1px solid #e94560; width: 90%; max-width: 700px; border-radius: 20px; background: #16213e; }
        .ad-space { background: #0f3460; border: 1px dashed #4ecca3; margin: 15px 0; padding: 10px; color: #4ecca3; font-size: 12px; border-radius: 10px; min-height: 50px; }
        #gameCanvas { background: #ffffff; border-radius: 10px; cursor: crosshair; margin-top: 10px; border: 4px solid #1a1a2e; width: 100%; height: 300px; }
        .scratch-blocks { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; background: #1a1a2e; padding: 15px; border-radius: 15px; border: 1px solid #f1c40f; }
        .block { background: #f1c40f; color: #000; padding: 10px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; }
        .block:hover { transform: translateY(-3px); box-shadow: 0 5px 10px rgba(241, 196, 15, 0.4); }
        .block.blue { background: #3498db; color: white; }
        .block.purple { background: #9b59b6; color: white; }
        .studio-controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <nav>Multidisciplinary Dev Hub</nav>

    <div class="ad-space">
        <script async="async" data-cfasync="false" src="https://pl28860380.effectivegatecpm.com/cdc37c03ed697e2040d2452101dfaba0/invoke.js"></script>
        <div id="container-cdc37c03ed697e2040d2452101dfaba0"></div>
    </div>

    <div class="container" style="border-color: #f1c40f;">
        <h3>🧩 Scratch Lite & Game Studio</h3>
        <p style="font-size: 14px; color: #ccc;">ارسم العنصر أولاً داخل المربع الأبيض، ثم استخدم المكعبات لتحريكه!</p>
        
        <div class="studio-controls">
            <input type="color" id="obj-color" value="#e94560">
            <select id="obj-shape">
                <option value="rect">مربع (Player)</option>
                <option value="circle">دائرة (Ball)</option>
                <option value="heart">قلب (Bonus)</option>
            </select>
            <button onclick="clearCanvas()" style="background:#555; color:white; padding:5px 10px; border-radius:5px; border:none; cursor:pointer;">مسح</button>
        </div>

        <canvas id="gameCanvas" width="500" height="300"></canvas>

        <div class="scratch-blocks">
            <button class="block blue" onclick="moveObject('right')">تحرك يمين ➔</button>
            <button class="block blue" onclick="moveObject('left')">تحرك يسار ⬅</button>
            <button class="block purple" onclick="changeObjectColor()">تغيير اللون 🎨</button>
            <button class="block" onclick="playScratchSound()">تشغيل صوت 🔊</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        // إعدادات العنصر الافتراضي
        let currentObj = { x: 250, y: 150, size: 40, color: '#e94560', shape: 'rect' };

        // وظيفة الرسم
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currentObj.color;
            if (currentObj.shape === 'rect') {
                ctx.fillRect(currentObj.x - 20, currentObj.y - 20, 40, 40);
            } else if (currentObj.shape === 'circle') {
                ctx.beginPath(); 
                ctx.arc(currentObj.x, currentObj.y, 20, 0, Math.PI*2); 
                ctx.fill();
            } else if (currentObj.shape === 'heart') {
                drawHeart(currentObj.x, currentObj.y, 40);
            }
        }

        // الرسم بالماوس
        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            currentObj.x = e.clientX - rect.left;
            currentObj.y = e.clientY - rect.top;
            currentObj.color = document.getElementById('obj-color').value;
            currentObj.shape = document.getElementById('obj-shape').value;
            draw();
        });

        // أوامر سكراتش (الحركة)
        function moveObject(dir) {
            if (dir === 'right') currentObj.x += 20;
            if (dir === 'left') currentObj.x -= 20;
            draw();
        }

        function changeObjectColor() {
            currentObj.color = '#' + Math.floor(Math.random()*16777215).toString(16);
            draw();
        }

        function playScratchSound() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function drawHeart(x, y, size) {
            ctx.beginPath();
            ctx.moveTo(x, y + size/4);
            ctx.quadraticCurveTo(x, y, x + size/4, y);
            ctx.quadraticCurveTo(x + size/2, y, x + size/2, y + size/4);
            ctx.quadraticCurveTo(x + size/2, y + size/2, x, y + size);
            ctx.quadraticCurveTo(x - size/2, y + size/2, x - size/2, y + size/4);
            ctx.quadraticCurveTo(x - size/2, y, x - size/4, y);
            ctx.quadraticCurveTo(x, y, x, y + size/4);
            ctx.fill();
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // تشغيل الرسم لأول مرة
        draw();
    </script>
</body>
</html>
